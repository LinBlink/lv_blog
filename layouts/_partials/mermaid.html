{{- if .Store.Get "hasMermaid" }}
<style>
  .mermaid-container {
    position: relative;
    margin: 1.5rem 0;
    padding: 15px;
    /* 给图表四周留出一点内边距 */
    border: 1px solid var(--border);
    /* 使用 Hugo 主题的默认边框颜色 */
    border-radius: 8px;
    /* 圆角 */
    background-color: var(--entry);
    /* 使用 Hugo 的条目背景色，让图表有凝聚感 */
    box-shadow: var(--shadow);
    /* 可选：加入主题自带的微弱阴影 */
  }

  .mermaid-view-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    z-index: 10;
    padding: 4px 8px;
    font-size: 12px;
    background-color: var(--theme);
    color: var(--content);
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    opacity: 0.6;
    transition: opacity 0.2s;
  }

  .mermaid-container:hover .mermaid-view-btn {
    opacity: 1;
  }

  /* 让渲染出来的 SVG 居中并且水平不溢出 */
  .mermaid svg {
    display: block;
    margin: 0 auto;
    max-width: 100%;
    height: auto;
  }
</style>

<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.esm.min.mjs';

  function getMermaidTheme() {
    return document.documentElement.dataset.theme === 'dark' ? 'dark' : 'default';
  }

  // 新标签页打开图片的核心函数
  function openSvgInNewTab(mermaidEl) {
    // 1. 找到渲染后的 SVG 元素
    const svgEl = mermaidEl.querySelector('svg');
    if (!svgEl) return;

    // 2. 将 SVG 转换为字符串并转为 Base64
    const svgString = new XMLSerializer().serializeToString(svgEl);
    const svgBase64 = window.btoa(unescape(encodeURIComponent(svgString)));
    const svgUrl = 'data:image/svg+xml;base64,' + svgBase64;

    // 3. 打开新标签页并渲染，方便用户缩放
    const newTab = window.open();
    if (newTab) {
      newTab.document.writeHead;
      newTab.document.title = "View Mermaid Diagram";
      newTab.document.body.style.margin = "0";
      newTab.document.body.style.backgroundColor = getMermaidTheme() === 'dark' ? '#1d1e20' : '#fff';

      const img = newTab.document.createElement('img');
      img.src = svgUrl;
      img.style.maxWidth = "100%";
      img.style.height = "auto";
      img.style.display = "block";
      img.style.margin = "auto";
      img.style.padding = "20px";

      newTab.document.body.appendChild(img);
    }
  }

  const diagrams = document.querySelectorAll('.mermaid');
  const originals = Array.from(diagrams).map(el => el.textContent);

  // 初始化：动态包裹容器并添加按钮
  diagrams.forEach((el) => {
    const container = document.createElement('div');
    container.className = 'mermaid-container';
    el.parentNode.insertBefore(container, el);
    container.appendChild(el);

    // 创建按钮
    const btn = document.createElement('button');
    btn.className = 'mermaid-view-btn';
    btn.innerText = '🔍 放大查看';
    btn.addEventListener('click', () => openSvgInNewTab(el));
    container.appendChild(btn);
  });

  mermaid.initialize({ startOnLoad: false, theme: getMermaidTheme() });
  await mermaid.run();

  // ✅ 监听 <html> 元素的 data-theme 属性变化
  const observer = new MutationObserver(() => {
    const newTheme = getMermaidTheme();
    diagrams.forEach((el, i) => {
      el.removeAttribute('data-processed');
      el.innerHTML = originals[i];
    });
    mermaid.initialize({
      startOnLoad: false,
      theme: newTheme,
    });
    mermaid.run();
  });

  observer.observe(document.documentElement, {   // ✅ 目标是 <html>，不是 <body>
    attributes: true,
    attributeFilter: ['data-theme']              // ✅ 过滤 data-theme，不是 class
  });
</script>
{{- end }}
