baseURL: 'https://lv-blog.pages.dev/'
title: 'LOCRIAN_V blog 博客'
theme: 'PaperMod'
defaultContentLanguage: 'zh'
defaultContentLanguageInSubdir: false  # 中文为根路径，不加 /zh/ 前缀


markup:
  goldmark:
    renderer:
      unsafe: true  # 允许在 Markdown 中使用原生 HTML
      
     
# 多语言配置
languages:
  # ---------------- 中文版配置 ----------------
  zh:
    label: "简体中文"
    title: '洛克里亚的五度 博客'
    locale: 'zh-cn'
    weight: 1
    params:
      footer:
        text: '保留所有权利'
    menu:
      main:
        - name: "🤔思考"
          url: "/categories/思考/"
          weight: 10
        - name: "💻编程"
          url: "/categories/编程/"
          weight: 20
        - name: "🎹钢琴"
          url: "/categories/钢琴/"
          weight: 30
        - name: "🌙故事"
          url: "/categories/故事/"
          weight: 40
        - name: "🔨项目"
          url: "/categories/项目/"
          weight: 41
        - name: "所有分类"
          url: "/categories/"
          weight: 50
        - name: "所有标签"
          url: "/tags/"
          weight: 60

  # ---------------- 英文版配置 ----------------
  en:
    label: "English"
    title: 'LOCRIAN_V Blog'
    locale: 'en-us'
    weight: 2
    params:
      footer:
        text: 'All Rights Reserved'
    menu:
      main:
        - name: "🤔Thoughts"
          url: "/categories/thoughts/"   # 与中文保持同一 taxonomy slug
          weight: 10
        - name: "💻Programming"
          url: "/categories/programming/"
          weight: 20
        - name: "🎹Piano"
          url: "/categories/piano/"
          weight: 30
        - name: "🌙Stories"
          url: "/categories/stories/"
          weight: 40
        - name: "🔨Projects"
          url: "/categories/projects/"
          weight: 41
        - name: "Categories"
          url: "/ategories/"
          weight: 50
        - name: "Tags"
          url: "/tags/"
          weight: 60

# PaperMod 主题全局参数
params:
  defaultTheme: auto          # 跟随系统深浅色（auto / light / dark）
  ShowReadingTime: true       # 显示阅读时长
  ShowBreadCrumbs: true       # 显示面包屑导航
  ShowPostNavLinks: true      # 文章底部上下篇导航
  ShowShareButtons: true     # 关闭分享按钮（国内环境意义不大）
  ShowCodeCopyButtons: true   # 代码块显示复制按钮
  ShowToc: true               # 显示文章目录
  TocOpen: false              # 目录默认折叠
  dateFormat: "2006-01-02 05:04:05 AM"
  label:
    icon: 'logo.jpg'
    iconHeight: 30
  enableGitInfo: true

# 输出格式（启用 RSS）
outputs:
  home:
    - HTML
    - RSS
    - JSON   # PaperMod 搜索功能依赖 JSON