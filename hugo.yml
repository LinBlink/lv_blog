baseURL: 'https://lv-blog.pages.dev/'
title: 'LOCRIAN_V blog 博客'
theme: 'PaperMod'
defaultContentLanguage: 'zh'

markup:
  goldmark:
    renderer:
      unsafe: true # 允许在 Markdown 中使用原生 HTML

# 多语言配置
languages:
  # ---------------- 中文版配置 ----------------
  zh:
    label: "简体中文"
    title: '洛克里亚的五度 博客'
    locale: 'zh-cn'
    weight: 1
    # 中文版导航栏
    menu:
      main:
        - name: "🤔思考"
          url: "/categories/thinking"
          weight: 10
        - name: "💻编程"
          url: "/categories/programming"
          weight: 20
        - name: "🎹钢琴"
          url: "/categories/piano"
          weight: 30
        - name: "🌙故事"
          url: "/categories/stories"
          weight: 40
        - name: "所有分类"
          url: "/categories/"
          weight: 50
        - name: "所有标签"
          url: "/tags/"
          weight: 60

  # ---------------- 英文版配置 ----------------
  en:
    label: "English"
    title: 'LOCRIAN_V Blog'
    locale: 'en-us'
    weight: 2
    # 英文版导航栏
    menu:
      main:
        - name: "🤔Thoughts"
          url: "/en/categories/thoughts"
          weight: 10
        - name: "💻Programming"
          url: "/en/categories/programming"
          weight: 20
        - name: "🎹Piano"
          url: "/en/categories/piano"
          weight: 30
        - name: "🌙Stories"
          url: "/en/categories/stories"
          weight: 40
        - name: "All Categories"
          url: "/en/categories/"
          weight: 50
        - name: "Tags"
          url: "/en/tags/"
          weight: 60